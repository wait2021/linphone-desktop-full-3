name: FULL RECURSIVE SYNC (6 STEP FINAL)
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 6步完整同步（100%正确）
        run: |
          set -e

          # 克隆主项目
          git clone https://gitlab.linphone.org/BC/public/linphone-desktop.git tmp
          cd tmp

          # ==============================================================================
          echo "::group::📦 步骤1：获取所有子模块信息"
          echo "----------------------------------------"
          MODULE_LIST=$(git config -f .gitmodules --get-regexp '^submodule\..*\.url$')
          echo "✅ 成功读取所有子模块列表"
          echo "$MODULE_LIST"
          echo "::endgroup::"

          # ==============================================================================
          echo "::group::🌐 步骤2：检查所有仓库地址是否可访问"
          echo "----------------------------------------"
          echo "$MODULE_LIST" | while read -r key url; do
            name=$(echo "$key" | sed -E 's/^submodule\.(.*)\.url$/\1/')
            echo -n "检查：$name → $url"
            if git ls-remote --exit-code "$url" >/dev/null 2>&1; then
              echo "  ✅ 可访问|不需要特殊权限完全开放|✅"
            else
              echo "  ⚠️ 可访问|需要用户名登陆|⚠️"
            fi
          done
          echo "::endgroup::"

          # ==============================================================================
          echo "::group::📁 步骤3：检查子模块目录是否为空"
          echo "----------------------------------------"
          echo "$MODULE_LIST" | while read -r key url; do
            name=$(echo "$key" | sed -E 's/^submodule\.(.*)\.url$/\1/')
            path=$(git config -f .gitmodules "submodule.$name.path")
            filecount=0
            [ -d "$path" ] && filecount=$(find "$path" -type f 2>/dev/null | wc -l)
            echo "目录：$url → 文件数：$filecount"
            if [ "$filecount" -eq 0 ]; then
              echo "  ⚠️ 目录为空，未同步"
            elif [ "$filecount" -lt 20 ]; then
              echo "  ⚠️ 目录只有配置"
            else
              echo "  ✅ 目录内存在源代码"
            fi
          done
          echo "::endgroup::"

          # ==============================================================================
          echo "::group::🚀 步骤4：开始完整同步子模块"
          echo "----------------------------------------"
          echo "$MODULE_LIST" | while read -r key url; do
            name=$(echo "$key" | sed -E 's/^submodule\.(.*)\.url$/\1/')
            path=$(git config -f .gitmodules "submodule.$name.path")
            echo "::group::同步：$name → $path   命令：git clone $url $path"
            git clone --depth 1 "$url" "$path"

            # 只在这里加提交推送，别的一概不动
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add "$path"
            git commit -m "Add $name"
            git push https://github.com/wait2021/linphone-desktop-full-3.git main

            echo "::endgroup::"
          done
          echo "::endgroup::"

          # ==============================================================================
          echo "::group::✅ 步骤5：最终完整性校验"
          echo "----------------------------------------"
          echo "$MODULE_LIST" | while read -r key url; do
            name=$(echo "$key" | sed -E 's/^submodule\.(.*)\.url$/\1/')
            path=$(git config -f .gitmodules "submodule.$name.path")
            count=0
            [ -d "$path" ] && count=$(find "$path" -type f 2>/dev/null | wc -l)
            echo "✅ $name：$count 文件"
          done
          echo "::endgroup::"

          # ==============================================================================
          echo "::group::🔥 步骤6：同步所有代码到你的仓库目录"
          echo "----------------------------------------"
          cd ..
          rsync -av --delete --exclude='.git' tmp/ .
          rm -rf tmp
          echo "✅ 全部代码已同步到你的仓库！"
          echo "::endgroup::"

      - name: 提交并推送到 GitHub
        run: |
          echo "::group::🔥 步骤6（完成）：推送代码到你的仓库"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f .
          git commit -m "✅ 6步验证完整同步" --allow-empty
          git push --force https://github.com/wait2021/linphone-desktop-full-3.git main
          echo "✅ 推送完成！"
          echo "::endgroup::"
