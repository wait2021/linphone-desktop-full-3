name: 只验证步骤1
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 步骤1：获取官方 .gitmodules
        run: |
          set -e
          
          # 直接下载官方线上 .gitmodules 文件
          curl -sSL "https://gitlab.linphone.org/BC/public/linphone-desktop/-/raw/master/.gitmodules" -o .gitmodules.online
          
          # 读取所有子模块
          MODULE_LIST=$(git config -f .gitmodules.online --get-regexp '^submodule\..*\.url$')
          
          # 输出结果
          echo "✅ 成功获取所有子模块"
          echo "$MODULE_LIST"
