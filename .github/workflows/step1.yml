name: 递归解析.gitmodules
on: workflow_dispatch

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: 完整提取子模块（带异常捕获）
        run: |
          # ========== 基础日志 ==========
          info()  { echo -e "\033[32m[INFO] $1\033[0m"; }
          error() { echo -e "\033[31m[ERROR] $1\033[0m"; }
          step()  { echo -e "\n==================================================\n[STEP] $1\n=================================================="; }

          # ========== 1. 检测URL（带异常捕获） ==========
          check_url() {
            local url="$1"
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "$url" 2>/dev/null)
            [[ $code == 200 ]]
          }

          # ========== 2. 下载文件 ==========
          download() {
            local url="$1"
            curl -sL --connect-timeout 15 "$url" 2>/dev/null
          }

          # ========== 3. ✅ 修复：正确提取 .gitmodules 中的所有 url ==========
          extract_modules() {
            local content="$1"
            echo "$content" | awk '/^[[:space:]]*url/ {print $3}'
          }

          # ========== 主执行逻辑 ==========
          URL="https://gitlab.linphone.org/BC/public/linphone-desktop/-/raw/master/.gitmodules"
          
          step "开始解析"
          info "目标：$URL"

          # 异常捕获
          if ! check_url "$URL"; then
            error "访问失败"
            exit 1
          fi
          info "✅ 连通成功"

          # 下载内容
          content=$(download "$URL")
          if [ -z "$content" ]; then
            error "内容为空"
            exit 1
          fi

          # 提取子模块
          step "提取到的所有子模块 URL"
          extract_modules "$content"

          step "执行完成"
