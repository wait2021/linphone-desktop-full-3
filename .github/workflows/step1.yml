name: 递归解析子模块【最终最终版】
on: workflow_dispatch

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: 开始解析
        run: |
          #!/bin/bash
          set -e

          parse() {
            local repo="$1"
            echo "============================================="
            echo "解析仓库：$repo"

            # 拼接 .gitmodules 地址
            local gm_url="${repo%.git}/-/raw/master/.gitmodules"
            local content=$(curl -Ssf --connect-timeout 2 --max-time 3 "$gm_url" 2>/dev/null || true)

            if [ -z "$content" ]; then
              echo "无 .gitmodules"
              return
            fi

            # 提取所有子模块 URL
            echo "$content" | grep -E '^[ \t]*url[ \t]*=' | while IFS='=' read -r k v; do
              local url=$(echo "$v" | xargs)

              # 协议正则：严格标准格式
              if [[ ! "$url" =~ ^[a-zA-Z][a-zA-Z0-9+.-]*://[a-zA-Z0-9]+\. ]]; then
                echo "跳过：$url"
                continue
              fi

              echo "有效子模块：$url"
              parse "$url"
            done
          }

          # 启动
          parse "https://gitlab.linphone.org/BC/public/linphone-desktop.git"
