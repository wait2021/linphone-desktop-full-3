name: 递归解析所有子模块（终极版）
on:
  workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 递归解析 .gitmodules
        run: |
          set -e

          # 递归函数：解析一个仓库的 .gitmodules，并继续解析子模块
          parse() {
            local repo="$1"
            echo "============================================="
            echo "📦 解析仓库：$repo"

            # 拼接 .gitmodules 下载地址
            gitmodules_url="${repo%.git}/-/raw/master/.gitmodules"
            echo "📥 下载：$gitmodules_url"

            # 下载文件
            content=$(curl -s -f --connect-timeout 3 --max-time 5 "$gitmodules_url" 2>/dev/null || true)
            if [ -z "$content" ]; then
              echo "✅ 最底层模块，无 .gitmodules"
              return
            fi

            echo "$content" > .tmp_modules

            # 循环读取每一个子模块 URL
            grep -E '^[[:space:]]*url[[:space:]]*=' .tmp_modules | while IFS='=' read -r key val; do
              sub_url=$(echo "$val" | xargs)
              echo "🔗 子模块URL：$sub_url"
              
              # 递归：进入子模块继续解析
              parse "$sub_url"
            done
          }

          # 从根仓库开始
          parse "https://gitlab.linphone.org/BC/public/linphone-desktop.git"
