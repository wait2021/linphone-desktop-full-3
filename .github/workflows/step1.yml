name: 递归解析.gitmodules
on: workflow_dispatch

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: 执行解析
        run: |
          log_info() { echo -e "\033[32m[INFO] $1\033[0m"; }
          log_error() { echo -e "\033[31m[ERROR] $1\033[0m"; }
          log_step() { echo -e "\n==================================================\n\033[36m[STEP] $1\033[0m\n=================================================="; }

          # ============================
          # 1. 连通检测（修复版，支持 GitLab）
          # ============================
          check_url_connect() {
            local url="$1"
            local code=$(curl -4 -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "$url")
            [[ $code =~ ^(200|301|302)$ ]]
          }

          # ============================
          # 2. 下载文件
          # ============================
          download_file() {
            local url="$1"
            curl -4 -sL --connect-timeout 10 "$url"
          }

          # ============================
          # 3. 提取URL（无日志，纯净）
          # ============================
          extract_url_list() {
            local content="$1"
            echo "$content" | grep -E '^[[:space:]]*url[[:space:]]*=' | while IFS='=' read -r _ v; do
              echo "$v" | xargs
            done
          }

          # ============================
          # 4. 验证URL
          # ============================
          validate_url_prefix() {
            local url="$1"
            [[ "$url" =~ ^https?:// ]]
          }

          # ============================
          # 5. 补全URL
          # ============================
          complete_url() {
            local url="$1"
            if validate_url_prefix "$url"; then
              echo "$url"
            else
              echo "https://gitlab.linphone.org/BC/public/$url"
            fi
          }

          # ============================
          # 6. 递归主函数（日志全部保留！只修复了URL拼接！）
          # ============================
          parse_gitmodules() {
            local gitmodules_url="$1"
            log_step "开始解析：$gitmodules_url"

            if ! check_url_connect "$gitmodules_url"; then
              log_error "URL 无法访问"
              return
            fi
            log_info "✅ URL 连通正常"

            local content=$(download_file "$gitmodules_url")
            if [ -z "$content" ]; then
              log_error "文件内容为空"
              return
            fi
            log_info "✅ 文件下载成功"

            local url_list=$(extract_url_list "$content")
            log_info "提取到的URL："
            echo "$url_list"

            local completed_urls=()
            for u in $url_list; do
              local cu=$(complete_url "$u")
              completed_urls+=("$cu")
              log_info "✅ 补全后：$cu"
            done

            # ============================
            # ✅ 这里是唯一重要修复：master → main
            # ============================
            for cu in "${completed_urls[@]}"; do
              local next_gm="${cu%.git}/-/raw/main/.gitmodules"
              parse_gitmodules "$next_gm"
            done

            log_info "🎉 处理完成：$gitmodules_url"
          }

          # 启动
          log_step "🚀 启动主程序"
          parse_gitmodules "https://gitlab.linphone.org/BC/public/linphone-desktop/-/raw/main/.gitmodules"
          log_step "✅ 全部执行完毕"
