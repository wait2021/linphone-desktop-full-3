name: 递归解析.gitmodules
on:
  workflow_dispatch

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: 执行解析
        run: |
          # ===================== 下载文件方法 =====================
          download_file() {
            local url="$1"
            # 去掉所有屏蔽，显示真实错误！！！
            curl -4 -L --fail --connect-timeout 10 --max-time 15 "$url"
          }

          # ===================== URL校验方法 =====================
          check_url() {
            local url="$1"
            [[ "$url" =~ ^[a-zA-Z][a-zA-Z0-9+.-]*://[a-zA-Z0-9]+\. ]]
          }

          # ===================== 提取URL列表方法 =====================
          extract_urls() {
            local content="$1"
            echo "$content" | grep -E '^[ \t]*url[[:space:]]*=' | while IFS='=' read -r k v; do
              echo "$v" | xargs
            done
          }

          # ===================== 递归解析主方法 =====================
          parse_gitmodules() {
            local gitmodules_url="$1"
            echo "============================================="
            echo "解析文件：$gitmodules_url"

            local content
            content=$(download_file "$gitmodules_url")

            if [ -z "$content" ]; then
              echo "❌ 下载内容为空"
              return
            fi

            echo "✅ 文件下载成功"
            local url_list=$(extract_urls "$content")

            for sub_url in $url_list; do
              if check_url "$sub_url"; then
                echo "🔗 有效子模块仓库：$sub_url"
                local next_gm="${sub_url%.git}/-/raw/master/.gitmodules"
                parse_gitmodules "$next_gm"
              else
                echo "⚠️ 跳过无效地址：$sub_url"
              fi
            done
          }

          # ==================== 启动 ====================
          parse_gitmodules "https://gitlab.linphone.org/BC/public/linphone-desktop/-/raw/master/.gitmodules"
