name: 递归解析所有子模块【最终完整版】
on:
  workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 递归解析 .gitmodules
        run: |
          set -e

          # 递归解析函数
          parse_modules() {
            local repo_url="$1"
            echo "============================================="
            echo "📦 解析仓库：$repo_url"

            # 拼接 .gitmodules 下载地址
            local gitmodules_url="${repo_url%.git}/-/raw/master/.gitmodules"
            
            # 下载文件
            local content=$(curl -s -f --connect-timeout 3 --max-time 5 "$gitmodules_url" 2>/dev/null || true)
            if [ -z "$content" ]; then
              echo "✅ 无 .gitmodules 文件，到达最底层"
              return
            fi

            echo "$content" > .tmp_gitmodules

            # 读取所有 url 配置
            grep -E '^[ \t]*url[ \t]*=' .tmp_gitmodules | while IFS='=' read -r key val; do
              local sub_url=$(echo "$val" | xargs)

              # ===================== 【最终正则】=====================
              # 规则：
              # 1. 协议必须【字母开头】，后面可跟字母/数字/+/-/.
              # 2. 必须出现 ://
              # 3. 后面必须是 字母/数字 + . （域名格式）
              if [[ ! $sub_url =~ ^[a-zA-Z][a-zA-Z0-9+.-]*://[a-zA-Z0-9]+\. ]]; then
                echo "⚠️  跳过无效子模块地址：$sub_url"
                continue
              fi
              # ======================================================

              echo "🔗 有效子模块：$sub_url"
              
              # 递归继续解析
              parse_modules "$sub_url"
            done
          }

          # 从根项目开始执行
          parse_modules "https://gitlab.linphone.org/BC/public/linphone-desktop.git"
